  - conda-forge
  - anaconda
  - defaults
dependencies:
  - python==3.10
  - numpy==1.26.4
  - joblib==1.5.0
  - pandas==2.2.3
  - matplotlib==3.10.3
  - keras==3.9.2
  - scikit-learn==1.6.1
  - plotly==6.1.0
  - scipy==1.15.3
  - seaborn
  - notebook
  - pip
  - pip:
    - jax==0.6.0
